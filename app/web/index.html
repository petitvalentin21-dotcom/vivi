<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VIVI MVP</title>
  <link rel="stylesheet" href="/web/style.css" />
</head>
<body>
  <main class="container" id="main-content">
    <header class="panel">
      <h1>VIVI</h1>
      <div class="runtime-row">
        <div id="runtime-status" class="status" role="status" aria-live="polite">Chargement runtime...</div>
        <button id="refresh-runtime-btn" type="button" class="secondary-btn" aria-label="Rafraîchir le statut runtime">Rafraîchir runtime</button>
      </div>
      <div class="meta-grid">
        <div><strong>Backend:</strong> <span id="backend-state">-</span></div>
        <div><strong>Provider:</strong> <span id="provider-name">-</span></div>
        <div><strong>Modèle:</strong> <span id="provider-model">-</span></div>
        <div><strong>Disponible:</strong> <span id="provider-available">-</span></div>
        <div><strong>Vault:</strong> <span id="vault-state">-</span></div>
        <div><strong>Notes:</strong> <span id="vault-notes">-</span></div>
      </div>
    </header>

    <section class="panel">
      <h2>Conversation</h2>
      <div id="session-status" class="status" role="status" aria-live="polite">Session locale : nouvelle</div>
      <div id="chat-log" class="chat-log" role="log" aria-live="polite" aria-relevant="additions text"></div>

      <form id="chat-form" class="chat-form" aria-describedby="loading">
        <label for="mode">Mode</label>
        <select id="mode" name="mode" aria-label="Choisir le mode de conversation">
          <option value="chat">chat</option>
          <option value="document">document</option>
        </select>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" placeholder="Écris ton message..." aria-label="Message à envoyer"></textarea>

        <div class="actions-row">
          <button id="send-btn" type="submit" aria-label="Envoyer le message">Envoyer</button>
          <button id="reset-conversation-btn" type="button" class="secondary-btn" aria-label="Réinitialiser la conversation locale">Réinitialiser la conversation</button>
        </div>
        <span id="loading" class="loading hidden" role="status" aria-live="polite">Envoi en cours...</span>
      </form>

      <div id="error-box" class="error hidden" role="alert" aria-live="assertive"></div>
    </section>

    <section id="sources-panel" class="panel hidden">
      <h2>Sources</h2>
      <div id="sources-empty" class="sources-empty hidden">Aucune source retournée pour cette réponse documentaire.</div>
      <div id="sources-list" class="sources-list"></div>
    </section>
  </main>

  <script src="/web/app.js"></script>
</body>
</html>
